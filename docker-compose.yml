# ============================================
# Docker Compose - Smart Yard Monitoring System
# Frontend + Backend (MongoDB Atlas as DB)
# ============================================

services:

  # ============ Backend API Server ============
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartyard-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000

      # MongoDB Atlas connection string
      MONGODB_URI: ${MONGODB_URI}

      # Frontend URL for CORS
      FRONTEND_URL: http://localhost:3000
    networks:
      - smartyard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s


  # ============ Frontend (React + Nginx) ============
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: smartyard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smartyard-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


# ============ Networks ============
networks:
  smartyard-network:
    driver: bridge
    name: smartyard-network